const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');
.app *{box-sizing:border-box;margin:0;padding:0}
.app{
  --ink:#080f1f;--ink2:#0c1730;--ink3:#11203f;--card:#0e1b36;
  --line:rgba(140,170,220,.12);--line2:rgba(140,170,220,.07);
  --fg:#eaf1fb;--muted:#8ba0c4;--faint:#5c6e8f;--gold:#E9B23C;--ice:#5EC8F0;--rose:#fb7185;
  position:relative;min-height:100vh;width:100%;color:var(--fg);
  background:radial-gradient(1200px 540px at 78% -10%,rgba(94,200,240,.10),transparent 60%),
    radial-gradient(900px 480px at 12% -6%,rgba(233,178,60,.09),transparent 58%),
    linear-gradient(180deg,#0a1326,#070d1c 60%);
  font-family:'Archivo',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(180deg,transparent 0 38px,rgba(255,255,255,.012) 38px 39px)}

/* top */
.top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;padding:13px 20px;
  border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(8,15,31,.95),rgba(8,15,31,.78));backdrop-filter:blur(12px)}
.brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:#1a1205;flex:none;
  background:linear-gradient(140deg,#F4CF6B,#D2901f);box-shadow:0 6px 20px -6px rgba(233,178,60,.6)}
.brand-t{font-weight:900;letter-spacing:.15em;font-size:16px;line-height:1}
.brand-s{font-size:10.5px;color:var(--muted);letter-spacing:.04em;margin-top:3px}
.tabs{display:flex;gap:4px;padding:4px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.03)}
.tabs button{display:flex;align-items:center;gap:7px;font-family:'Archivo';font-weight:700;font-size:13px;color:var(--muted);
  background:transparent;border:none;cursor:pointer;padding:9px 16px;border-radius:8px;transition:.16s}
.tabs button.on{background:linear-gradient(180deg,#16294a,#0f1d39);color:var(--fg);box-shadow:0 3px 10px -4px rgba(0,0,0,.6),inset 0 0 0 1px rgba(140,170,220,.18)}
.tabs button:hover:not(.on){color:var(--fg)}
.top-total{flex:1;display:flex;align-items:baseline;justify-content:flex-end;gap:7px}
.top-total span{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.14em;color:var(--faint)}
.top-total b{font-family:'Space Mono',monospace;font-size:25px;color:var(--gold);letter-spacing:-.02em}
.top-total i{font-size:11px;color:var(--muted);font-style:normal}

/* shared content frame */
.pk,.sc,.sm{max-width:1340px;margin:0 auto;padding:20px 20px 10px}

/* pots */
.pots{display:flex;gap:9px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
.pots::-webkit-scrollbar{display:none}
.pot{flex:0 0 auto;display:flex;align-items:center;gap:10px;text-align:left;padding:10px 14px;border:1px solid var(--line);
  border-radius:13px;cursor:pointer;color:var(--fg);background:linear-gradient(180deg,var(--ink2),var(--ink));transition:transform .15s,border-color .15s}
.pot:hover{transform:translateY(-1px)}
.pot-dot{width:8px;height:8px;border-radius:50%}
.pot-n{font-family:'Space Mono',monospace;font-weight:700;font-size:18px;color:var(--faint)}
.pot.on .pot-n{color:var(--fg)}
.pot-tx{display:flex;flex-direction:column;gap:1px}
.pot-l{font-size:12px;font-weight:700;white-space:nowrap}
.pot-tm{font-size:11px;color:var(--muted);white-space:nowrap}

.pk-main{display:grid;grid-template-columns:minmax(0,1fr) 318px;gap:18px;align-items:start}
.board{min-width:0;animation:fadeUp .4s ease both}
.board-h{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:13px;flex-wrap:wrap}
.eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;font-weight:700}
.board-desc{font-size:12.5px;color:var(--muted);margin-top:4px;max-width:52ch;line-height:1.5}
.oracle-tip{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);padding:7px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.02)}

.rows{list-style:none;display:flex;flex-direction:column;gap:7px}
.row-w{animation:fadeUp .42s ease both}
.row{position:relative;width:100%;display:grid;grid-template-columns:28px 1fr 150px 92px 64px;gap:14px;align-items:center;
  padding:13px 15px;border:1px solid var(--line);border-radius:13px;cursor:pointer;color:var(--fg);
  background:linear-gradient(180deg,var(--card),var(--ink));transition:transform .15s,border-color .15s,background .15s}
.row:hover{transform:translateY(-1px);border-color:rgba(140,170,220,.3);background:linear-gradient(180deg,#13243f,#0e1b36)}
.rank{font-family:'Space Mono',monospace;font-size:13px;color:var(--faint)}
.team{display:flex;align-items:center;gap:12px;min-width:0}
.flag{font-size:26px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.team-tx{display:flex;flex-direction:column;gap:3px;min-width:0}
.name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tags{display:flex;gap:6px}
.grp,.rtg{font-family:'Space Mono',monospace;font-size:10px;padding:2px 6px;border-radius:5px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--line2)}
.rtg{color:var(--faint)}
.prof{display:flex;align-items:flex-end;gap:4px;height:34px}
.prof-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;height:100%}
.prof-track{position:relative;width:100%;max-width:13px;height:100%;display:flex;align-items:flex-end;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.prof-fill{width:100%;border-radius:3px;transition:height .5s cubic-bezier(.2,.8,.2,1)}
.adv{display:flex;flex-direction:column;gap:5px}
.adv-n{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.adv-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden}
.adv-bar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,#3E9FD0,#7BD8F5);transition:width .5s}
.ep{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--gold);text-align:right;letter-spacing:-.02em}
.radio{position:absolute;top:50%;right:-9px;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;display:grid;place-items:center;border:1.5px solid var(--line);background:var(--ink);color:#07101f;transition:.15s}
.radio.on{background:var(--ice);border-color:var(--ice);box-shadow:0 0 14px rgba(94,200,240,.6)}

.drawer{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center;margin:-2px 6px 0;padding:14px 16px;border:1px solid #5EC8F033;border-top:none;border-radius:0 0 12px 12px;background:linear-gradient(180deg,rgba(94,200,240,.05),rgba(94,200,240,.01));animation:fadeUp .3s ease both}
.drawer-hh{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:var(--faint);margin-bottom:9px}
.prof-lg{height:62px;gap:9px}
.prof-lg .prof-track{max-width:26px}
.prof-meta{display:flex;flex-direction:column;align-items:center;margin-top:6px;gap:1px}
.prof-pct{font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.prof-lab{font-size:9px;color:var(--faint)}
.dn-stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:9px;font-size:11.5px;color:var(--muted)}
.dn-stats b{font-family:'Space Mono',monospace;color:var(--fg);font-size:14px;margin-right:3px}
.dn-verdict{font-size:12px;line-height:1.55;color:#cdd9ee;margin-bottom:7px}
.dn-weak{display:flex;gap:7px;align-items:flex-start;font-size:11.5px;line-height:1.45;color:#f2b8a0;margin-bottom:8px}
.dn-weak svg,.dn-text svg{flex:none;margin-top:2px}.dn-weak svg{color:var(--rose)}
.dn-weak b{color:#ffd9c9}
.dn-text{font-size:12px;color:var(--muted);line-height:1.5;display:flex;gap:6px;align-items:flex-start}
.dn-text b{color:var(--fg)}.dn-warn{color:#f4c98a}

/* coupon */
.coupon{position:sticky;top:84px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(180deg,var(--ink2),var(--ink));box-shadow:0 24px 60px -34px rgba(0,0,0,.9)}
.coupon-h{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px dashed var(--line);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.13em}
.mini{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer;padding:5px 9px;border:1px solid var(--line);border-radius:8px;background:transparent;font-family:'Space Mono',monospace;transition:.15s}
.mini:hover{color:var(--fg);border-color:var(--gold)}
.cp-rows{list-style:none;padding:8px}
.cp-row{display:flex;align-items:center;gap:9px;padding:9px;border-radius:9px;cursor:pointer;transition:background .14s}
.cp-row:hover{background:rgba(255,255,255,.03)}.cp-row.here{background:rgba(94,200,240,.07)}
.cp-dot{width:7px;height:7px;border-radius:50%;flex:none}
.cp-p{font-family:'Space Mono',monospace;font-size:11px;color:var(--faint);width:20px}
.cp-flag{font-size:19px}
.cp-name{flex:1;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cp-off{font-style:normal;font-size:9px;font-family:'Space Mono',monospace;color:#f4c98a;border:1px solid #f4c98a44;padding:1px 5px;border-radius:5px}
.cp-ep{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--gold)}
.cp-total{padding:14px 16px;border-top:1px dashed var(--line);background:rgba(233,178,60,.04)}
.cp-total-r{display:flex;justify-content:space-between;align-items:baseline}
.cp-total-r span{font-size:12px;color:var(--muted)}
.cp-total-r b{font-family:'Space Mono',monospace;font-size:29px;color:var(--gold);letter-spacing:-.02em}
.cp-bar{height:6px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;margin:9px 0 7px}
.cp-bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,#D2901f,#F4CF6B);transition:width .5s}
.cp-max{font-size:11px;color:var(--faint)}.cp-max b{color:#f4c98a;font-family:'Space Mono',monospace}
.warn{display:flex;gap:10px;margin:0 14px 12px;padding:11px 12px;border-radius:11px;background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25);color:#ffd9df;font-size:12px;line-height:1.5}
.warn svg{color:var(--rose);flex:none;margin-top:1px}.warn b{color:#fff}
.warn-sub{display:block;color:#d99aa6;font-size:10.5px;margin-top:3px}
.goals{margin:0 14px 12px;padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.02)}
.goals-h{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted)}
.goals-model{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold)}
.goals-step{display:flex;align-items:center;gap:8px;margin:10px 0 9px}
.goals-step button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--fg);cursor:pointer;display:grid;place-items:center;transition:.14s}
.goals-step button:hover{border-color:var(--ice);color:var(--ice)}
.goals-step input{flex:1;text-align:center;font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--fg);background:transparent;border:none;outline:none;-moz-appearance:textfield;width:100%}
.goals-step input::-webkit-outer-spin-button,.goals-step input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.goals-scale{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:9px;color:var(--faint)}
.goals-track{position:relative;flex:1;height:4px;border-radius:3px;background:rgba(255,255,255,.07)}
.goals-track i{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;background:var(--ice);transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(94,200,240,.6);transition:left .2s}
.copy{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 28px);margin:0 14px 16px;padding:12px;border-radius:11px;border:none;cursor:pointer;font-family:'Archivo';font-weight:700;font-size:13.5px;color:#0a1326;background:linear-gradient(135deg,#7BD8F5,#3E9FD0);box-shadow:0 10px 24px -12px rgba(94,200,240,.7);transition:.15s}
.copy:hover{filter:brightness(1.08)}

/* scout */
.sc-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.sc-filter button{display:flex;align-items:center;gap:7px;font-family:'Space Mono',monospace;font-size:11.5px;color:var(--muted);background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:9px;padding:8px 13px;cursor:pointer;transition:.15s}
.sc-filter button.on{color:#fff;background:linear-gradient(180deg,#13243f,#0e1b36)}
.sc-filter button:hover:not(.on){color:var(--fg)}
.sc-dot{width:7px;height:7px;border-radius:50%}
.dos-key{display:flex;flex-wrap:wrap;align-items:center;gap:7px 14px;margin:0 0 12px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,rgba(123,216,245,.06),var(--ink))}
.dos-key-h{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);width:100%}
.dos-key-i{font-size:11.5px;color:var(--muted);line-height:1.4}
.dos-key-i b{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.04em;color:#7BD8F5;margin-right:4px}
.dossier{display:grid;grid-template-columns:repeat(auto-fill,minmax(266px,1fr));gap:11px}
.dos{text-align:left;display:flex;flex-direction:column;gap:9px;padding:15px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--card),var(--ink));animation:fadeUp .4s ease both;transition:transform .15s,border-color .15s}
.dos:hover{transform:translateY(-2px);border-color:rgba(140,170,220,.3)}
.dos-top{display:flex;align-items:center;gap:10px}
.dos-flag{font-size:25px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.dos-name{flex:1;font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.dos-grp{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);padding:3px 7px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid var(--line2)}
.dos-verdict{font-size:12.5px;line-height:1.55;color:#cdd9ee}
.dos-weak{display:flex;gap:7px;align-items:flex-start;font-size:11.5px;line-height:1.45;color:#f2b8a0}
.dos-weak svg{color:var(--rose);flex:none;margin-top:2px}
.dos-stats{display:flex;gap:14px;margin-top:2px;padding-top:10px;border-top:1px solid var(--line2);font-size:10.5px;color:var(--faint);font-family:'Space Mono',monospace}
.dos-stats b{color:var(--fg);font-size:13px;margin-right:2px}.dos-ep{margin-left:auto}.dos-ep b{color:var(--gold)}

/* simulate */
.sm-hero{max-width:560px;margin:40px auto;text-align:center;animation:fadeUp .5s ease both}
.sm-ball{font-size:64px;line-height:1;filter:drop-shadow(0 10px 26px rgba(0,0,0,.5))}
.sm-title{font-size:30px;font-weight:900;letter-spacing:-.01em;margin:18px 0 10px}
.sm-sub{font-size:14px;color:var(--muted);line-height:1.6;max-width:46ch;margin:0 auto 26px}
.kick{display:inline-flex;align-items:center;gap:10px;font-family:'Archivo';font-weight:800;font-size:16px;color:#1a1205;
  padding:16px 30px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#F4CF6B,#D89B2C);
  box-shadow:0 14px 36px -12px rgba(233,178,60,.7),inset 0 1px 0 rgba(255,255,255,.3);transition:transform .15s,filter .15s;animation:pulseGlow 2.6s ease-in-out infinite}
.kick:hover{transform:translateY(-2px);filter:brightness(1.06)}
.sm-note{margin-top:16px;font-size:11.5px;color:var(--faint)}
.sm-load{max-width:460px;margin:70px auto;text-align:center}
.sm-ball.spin{animation:spin 1s linear infinite}
.sm-load-t{font-size:18px;font-weight:800;margin:20px 0 6px}
.sm-load-s{font-family:'Space Mono',monospace;font-size:11px;color:var(--faint);letter-spacing:.04em}
.sm-res{animation:fadeUp .45s ease both}

.champ{position:relative;overflow:hidden;text-align:center;padding:30px 20px 26px;border-radius:18px;margin-bottom:16px;
  border:1px solid rgba(233,178,60,.4);background:radial-gradient(600px 200px at 50% 0%,rgba(233,178,60,.16),transparent 70%),linear-gradient(180deg,#15213c,#0d1830)}
.champ-badge{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;margin:0 auto;color:#1a1205;background:linear-gradient(140deg,#F4CF6B,#D2901f);box-shadow:0 8px 24px -6px rgba(233,178,60,.7)}
.champ-k{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.3em;color:var(--gold);margin:14px 0 6px}
.champ-team{font-size:40px;font-weight:900;letter-spacing:-.02em;display:flex;align-items:center;justify-content:center;gap:14px}
.champ-flag{font-size:42px}
.champ-final{font-size:14px;color:#dfe7f3;margin-top:8px}
.champ-meta{font-size:12px;color:var(--muted);margin-top:6px}
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.confetti i{position:absolute;top:-12px;width:7px;height:12px;border-radius:1px;animation-name:fall;animation-timing-function:linear;animation-iteration-count:1}
@keyframes fall{to{transform:translateY(360px) rotate(540deg);opacity:0}}

.run-coupon{border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;background:linear-gradient(180deg,var(--ink2),var(--ink))}
.rc-head{display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;margin-bottom:12px}
.rc-best{color:var(--muted);letter-spacing:.04em}.rc-best b{color:var(--gold);font-size:14px}
.rc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.rc-card{padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.02)}
.rc-card.champ-pick{border-color:rgba(233,178,60,.5);background:rgba(233,178,60,.07)}
.rc-top{display:flex;align-items:center;gap:8px}
.rc-flag{font-size:20px}.rc-name{flex:1;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-pts{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;color:var(--gold)}
.rc-stage{font-size:11px;color:var(--muted);margin-top:5px}
.rc-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:13px;padding-top:13px;border-top:1px dashed var(--line)}
.rc-total span{font-size:13px;color:var(--muted)}
.rc-total b{font-family:'Space Mono',monospace;font-size:26px;color:var(--gold)}

.resim{display:flex;align-items:center;justify-content:center;gap:9px;margin:0 auto 22px;padding:13px 26px;border-radius:12px;border:1px solid var(--line);
  cursor:pointer;font-family:'Archivo';font-weight:700;font-size:14px;color:var(--fg);background:linear-gradient(180deg,#16294a,#0f1d39);transition:.15s}
.resim:hover{border-color:var(--ice);transform:translateY(-1px)}

.sec-lab{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--faint);margin:8px 0 12px;text-align:center}
.bracket{display:flex;gap:18px;justify-content:center;overflow-x:auto;padding:6px 4px 16px;scrollbar-width:none}
.bracket::-webkit-scrollbar{display:none}
.br-col{display:flex;flex-direction:column;gap:9px;min-width:150px}
.br-mid{justify-content:space-around}
.br-lab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--faint);text-align:center;margin-bottom:4px}
.br-spacer{height:9px}.br-spacer.big{height:30px}
.br-final{display:flex;flex-direction:column;gap:9px}
.br-champ{display:flex;align-items:center;justify-content:center;gap:7px;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:#1a1205;
  padding:9px;border-radius:10px;background:linear-gradient(135deg,#F4CF6B,#D2901f);box-shadow:0 8px 20px -8px rgba(233,178,60,.6)}
.mc{position:relative;border:1px solid var(--line);border-radius:10px;padding:7px 9px;background:linear-gradient(180deg,var(--card),var(--ink));min-width:148px}
.mc-empty{opacity:0;min-height:62px}
.mc-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.mc-row.w .mc-code{color:var(--fg)}.mc-row.w .mc-sc{color:var(--gold)}
.mc-row:not(.w){opacity:.5}
.mc-flag{font-size:17px}
.mc-code{flex:1;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.02em}
.mc-sc{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--muted)}
.mc-tag{position:absolute;top:-7px;right:7px;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.06em;color:var(--faint);background:var(--ink2);border:1px solid var(--line);padding:1px 5px;border-radius:5px}

.coll{border:1px solid var(--line);border-radius:13px;margin-bottom:11px;overflow:hidden;background:rgba(255,255,255,.015)}
.coll-h{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;background:transparent;border:none;color:var(--fg);font-family:'Archivo';font-weight:700;font-size:14px}
.coll-chev{color:var(--muted);transition:transform .2s}
.coll.open .coll-chev{transform:rotate(180deg)}
.coll-body{padding:4px 16px 16px}
.ko-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ko-grid>div{display:flex;flex-direction:column;gap:7px}
.ko-rlab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--faint);margin-bottom:3px}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:11px}
.gm{border:1px solid var(--line);border-radius:11px;padding:11px;background:linear-gradient(180deg,var(--card),var(--ink))}
.gm-h{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.gm-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;font-size:13px}
.gm-row.q{background:rgba(94,200,240,.08)}
.gm-pos{font-family:'Space Mono',monospace;font-size:11px;color:var(--faint);width:12px}
.gm-row.q .gm-pos{color:var(--ice)}
.gm-flag{font-size:16px}.gm-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gm-pts{font-family:'Space Mono',monospace;font-weight:700;color:var(--fg)}

.foot{max-width:1340px;margin:6px auto 0;padding:16px 20px 32px;font-size:11px;color:var(--faint);text-align:center}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:60;padding:11px 20px;border-radius:11px;font-size:13px;font-weight:600;color:#0a1326;background:linear-gradient(135deg,#F4CF6B,#D2901f);box-shadow:0 12px 30px -10px rgba(0,0,0,.6);animation:fadeUp .25s ease both}

@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 14px 36px -12px rgba(233,178,60,.55),inset 0 1px 0 rgba(255,255,255,.3)}50%{box-shadow:0 14px 46px -10px rgba(233,178,60,.9),inset 0 1px 0 rgba(255,255,255,.3)}}
:focus-visible{outline:2px solid var(--ice);outline-offset:2px}

/* ===== bookie ===== */
.bk{max-width:720px;margin:0 auto;padding:4px 2px 10px}
.bk-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(233,178,60,.14),rgba(233,178,60,.04));border:1px solid rgba(233,178,60,.3);border-radius:14px;padding:14px 18px;margin-bottom:18px}
.bk-bal{display:flex;flex-direction:column;gap:2px}
.bk-bal-l{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.bk-bal-v{font-family:'Space Mono',monospace;font-weight:700;font-size:26px;color:var(--gold)}
.bk-fun{font-size:11px;color:var(--faint);max-width:240px;text-align:right}
.bk-sec{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;color:var(--fg);margin:22px 0 11px}
.bk-out{display:flex;flex-direction:column;gap:5px}
.bk-orow{display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:11px;background:linear-gradient(180deg,var(--card),var(--ink));border:1px solid var(--line);border-radius:10px;padding:10px 13px;cursor:pointer;color:var(--fg);transition:.12s}
.bk-orow:hover{border-color:var(--line2)}
.bk-orow.sel{border-color:var(--gold);background:linear-gradient(180deg,rgba(233,178,60,.12),var(--ink))}
.bk-oflag{font-size:18px}
.bk-oname{text-align:left;font-size:14px;font-weight:600}
.bk-odds{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:var(--gold);min-width:52px;text-align:center;background:rgba(233,178,60,.1);border-radius:7px;padding:5px 8px}
.bk-orow.sel .bk-odds{background:var(--gold);color:#0a1326}
.bk-more{margin-top:4px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:9px;padding:9px;cursor:pointer}
.bk-sub{display:flex;gap:6px;margin-bottom:16px;background:#0b1f15;border:1px solid rgba(233,178,60,.25);border-radius:12px;padding:5px}
.bk-sub button{flex:1;padding:10px 6px;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#9fc4ad;font-family:'Archivo';font-weight:800;font-size:13px;transition:.15s}
.bk-sub button.on{background:linear-gradient(135deg,#f3c34b,#d99a2b);color:#0a1326}
.st-sub{display:flex;gap:6px;margin-bottom:16px;background:rgba(94,200,240,.06);border:1px solid rgba(94,200,240,.22);border-radius:12px;padding:5px}
.st-sub button{flex:1;padding:10px 6px;border:none;border-radius:8px;cursor:pointer;background:transparent;color:var(--muted);font-family:'Archivo';font-weight:800;font-size:13px;transition:.15s}
.st-sub button.on{background:linear-gradient(135deg,#5EC8F0,#2f9fd0);color:#06121f}
.bk-md{display:flex;gap:6px;margin-bottom:11px;overflow-x:auto;padding-bottom:5px;-webkit-overflow-scrolling:touch}
.bk-md button{flex:none;white-space:nowrap;font-family:'Space Mono',monospace;font-size:11.5px;color:var(--muted);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer}
.bk-md button.on{color:#fff;background:linear-gradient(180deg,#16294a,#0f1d39);border-color:var(--ice)}
.bk-picks2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
/* Alex's Corner */
.ac{animation:fadeUp .35s ease both}
.ac-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.ac-t{font-family:'Archivo';font-weight:900;font-size:18px;color:#FCE49A;letter-spacing:.02em}
.ac-s{font-size:11px;color:#9fc4ad;margin-top:2px}
.ac-bal{text-align:right;font-family:'Space Mono',monospace}.ac-bal span{display:block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#9fc4ad}.ac-bal b{font-size:17px;color:#fff}
.ac-canvas{width:100%;height:300px;display:block;border-radius:14px;border:1px solid rgba(233,178,60,.25);background:#0a1f14;box-shadow:inset 0 0 60px rgba(0,0,0,.4)}
.ac-live{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:12.5px;color:#cdd9ee}
.ac-dot{width:9px;height:9px;border-radius:50%;background:#34d399;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ac-result{margin-top:11px;padding:13px 15px;border-radius:12px;font-size:13.5px;line-height:1.45}
.ac-result.win{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.5);color:#d6ffe9}
.ac-result.lose{background:rgba(255,90,110,.1);border:1px solid rgba(255,90,110,.4);color:#ffd9df}
.ac-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:14px}
.ac-runner{display:flex;align-items:center;gap:9px;text-align:left;padding:9px 11px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.02);cursor:pointer;transition:.13s}
.ac-runner.on{border-color:#f3c34b;background:rgba(233,178,60,.1);box-shadow:0 0 0 1px rgba(233,178,60,.5)}
.ac-runner:disabled{opacity:.6;cursor:default}
.ac-num{flex:none;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:12px;color:#0a1326}
.ac-rn{flex:1;display:flex;flex-direction:column;min-width:0}
.ac-rname{font-family:'Archivo';font-weight:700;font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-tip{font-style:normal;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;background:#e0a52b;color:#3a2600;padding:1px 5px;border-radius:5px;margin-left:6px;vertical-align:middle}
.ac-rodds{font-family:'Space Mono',monospace;font-size:11px;color:#FCE49A;margin-top:1px}
.ac-silk{flex:none;width:7px;height:24px;border-radius:3px}
.ac-bet{display:flex;gap:9px;margin-top:14px}
.ac-stake{display:flex;align-items:center;gap:5px;padding:0 12px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.03);font-family:'Space Mono',monospace;color:#FCE49A}
.ac-stake input{width:72px;background:transparent;border:none;color:#fff;font-family:'Archivo';font-weight:700;font-size:15px;padding:11px 0;outline:none}
.ac-go{flex:1;padding:13px;border:none;border-radius:11px;cursor:pointer;font-family:'Archivo';font-weight:800;font-size:14px;color:#0a1326;background:linear-gradient(135deg,#f3c34b,#d99a2b);box-shadow:0 12px 26px -14px rgba(233,178,60,.9);transition:.15s}
.ac-go:disabled{opacity:.55;cursor:default;box-shadow:none}
.ac-again{background:linear-gradient(135deg,#7BD8F5,#3E9FD0)}
.ac-tobet{margin-top:10px;font-size:11.5px;color:var(--muted);line-height:1.45}.ac-tobet b{color:#fff}
.ac-foot{margin-top:12px;font-size:10.5px;color:var(--faint);line-height:1.5}
.bk-fix{display:flex;flex-direction:column;gap:9px}
.bk-game{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.015)}
.bk-grp{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--faint)}
.bk-picks{display:grid;grid-template-columns:1fr .7fr 1fr;gap:7px;margin-top:8px}
.bk-pick{display:flex;flex-direction:column;align-items:center;gap:5px;background:linear-gradient(180deg,#12203c,#0d192f);border:1px solid var(--line);border-radius:9px;padding:9px 6px;cursor:pointer;color:var(--fg);transition:.12s}
.bk-pick:hover{border-color:var(--line2)}
.bk-pick.sel{border-color:var(--gold);background:linear-gradient(180deg,rgba(233,178,60,.14),#0d192f)}
.bk-pf{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap}
.bk-pf .fimg{height:1.1em}
.bk-po{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:var(--gold)}
.bk-draw .bk-pf{color:var(--muted)}
.bk-slip{margin-top:18px;border:1px solid rgba(233,178,60,.35);border-radius:14px;background:linear-gradient(180deg,var(--ink2),var(--ink));padding:14px;box-shadow:0 14px 36px -18px rgba(233,178,60,.4)}
.bk-slip-h{display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;color:var(--gold);margin-bottom:11px}
.bk-slip-h button{background:transparent;border:none;color:var(--muted);cursor:pointer;display:flex}
.bk-sel{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line2);font-size:12.5px}
.bk-sel-l{flex:1}
.bk-sel-o{font-family:'Space Mono',monospace;font-weight:700;color:var(--gold)}
.bk-sel-x{background:transparent;border:none;color:var(--faint);cursor:pointer;display:flex;padding:0 2px}
.bk-stk{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;font-size:12px;color:var(--muted)}
.bk-stk input{width:90px;text-align:right;font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:var(--fg);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:8px;padding:8px 10px;outline:none;-moz-appearance:textfield}
.bk-stk input::-webkit-outer-spin-button,.bk-stk input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.bk-ret{margin-top:10px;font-size:12.5px;color:var(--muted)}
.bk-ret b{color:var(--fg);font-family:'Space Mono',monospace;font-size:15px}
.bk-place{width:100%;margin-top:12px;padding:13px;border:none;border-radius:11px;cursor:pointer;font-family:'Archivo';font-weight:800;font-size:15px;color:#0a1326;background:linear-gradient(135deg,#F4CF6B,#D2901f);transition:.15s}
.bk-place:hover{filter:brightness(1.07)}
.bk-place:disabled{opacity:.4;cursor:default}
.bk-warn{margin-top:8px;font-size:11.5px;color:var(--rose);text-align:center}
.bk-bets{display:flex;flex-direction:column;gap:8px}
.bk-bet{border:1px solid var(--line);border-radius:11px;padding:11px 13px;background:rgba(255,255,255,.015)}
.bk-bet-top{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px;font-weight:600}
.bk-bet-o{font-family:'Space Mono',monospace;color:var(--gold)}
.bk-bet-sels{font-size:11px;color:var(--faint);margin-top:5px}
.bk-bet-fig{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:9px;font-size:12.5px;color:var(--muted)}
.bk-bet-fig b{color:var(--fg);font-family:'Space Mono',monospace}
.bk-settle{display:flex;gap:5px}
.bk-settle button{font-family:'Space Mono',monospace;font-size:11px;border-radius:7px;padding:6px 9px;cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted)}
.bk-settle button:hover{color:var(--fg);border-color:var(--ice)}

/* ===== simcast ===== */
.sm-mode{display:flex;gap:6px;max-width:680px;margin:0 auto 16px}
.sm-mode button{flex:1;font-family:'Archivo';font-weight:700;font-size:13px;color:var(--muted);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:11px;padding:11px;cursor:pointer;transition:.15s}
.sm-mode button.on{color:var(--fg);background:linear-gradient(180deg,#16294a,#0f1d39);border-color:var(--ice)}
.sc{max-width:680px;margin:0 auto}
.sc-board{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:linear-gradient(180deg,#0c1730,#0a1428);border:1px solid var(--line);border-radius:14px 14px 0 0;padding:14px 16px 12px;position:relative}
.sc-side{display:flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-weight:700;font-size:15px}
.sc-side .sc-flag{font-size:22px;line-height:1}
.sc-right{justify-content:flex-end}
.sc-score{font-family:'Space Mono',monospace;font-weight:700;font-size:30px;letter-spacing:.04em;min-width:84px;text-align:center}
.sc-score span{color:var(--faint);margin:0 6px;font-size:20px;vertical-align:middle}
.sc-clock{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;color:#0a1326;background:var(--gold);padding:3px 11px;border-radius:7px;white-space:nowrap}
.sc-pitch{line-height:0;border-left:1px solid var(--line);border-right:1px solid var(--line)}
.sc-cv{display:block;width:100%;height:auto;background:#11702f}
.sc-controls{display:flex;align-items:center;gap:8px;background:linear-gradient(180deg,#0a1428,#091223);border:1px solid var(--line);border-top:none;border-radius:0 0 14px 14px;padding:11px 14px}
.sc-controls>button{font-family:'Archivo';font-weight:700;font-size:13px;color:var(--fg);background:linear-gradient(180deg,#16294a,#0f1d39);border:1px solid var(--line);border-radius:9px;padding:9px 16px;cursor:pointer;transition:.15s}

.sc-speed{margin-left:auto;display:flex;gap:4px}

.sc-speed button.on{color:#0a1326;background:var(--ice);border-color:var(--ice);font-weight:700}
.sc-pick{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center}

.sc-pick select:focus{border-color:var(--ice)}
.sc-v{color:var(--faint);font-family:'Space Mono',monospace;font-size:12px}
.sc-rand{font-family:'Space Mono',monospace;font-size:12px;color:var(--gold);background:rgba(233,178,60,.08);border:1px solid rgba(233,178,60,.3);border-radius:9px;padding:9px 12px;cursor:pointer}

.sc-bars{display:flex;flex-direction:column;gap:8px}
.sc-bar{position:relative;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--fg);background:rgba(255,255,255,.03);border-radius:8px;padding:9px 11px;overflow:hidden}

.sc-odds{margin-top:12px;font-size:11.5px;color:var(--muted);font-family:'Space Mono',monospace;line-height:1.5}

/* ===== live / refresh ===== */

.fimg{display:inline-block;height:.92em;width:auto;vertical-align:-.12em;border-radius:2.5px;box-shadow:0 0 0 .6px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);object-fit:cover;background:rgba(255,255,255,.04)}
.femoji{display:inline-block;font-style:normal;line-height:1}
.fcode{display:inline-flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:800;font-size:.56em;letter-spacing:.02em;line-height:1;height:1.55em;min-width:2.4em;padding:0 .32em;vertical-align:-.18em;border-radius:3px;color:#0a1326;background:linear-gradient(180deg,#e4e9f1,#c2cbd9);box-shadow:0 0 0 .6px rgba(0,0,0,.45),0 1px 2px rgba(0,0,0,.3)}
.lg-hero-flags .fcode,.cpx-fl .fcode{font-size:11px}
.bk-wire-fl .fcode{font-size:11.5px}.me-team .fcode{font-size:9.5px}
.lg-hero-flags .femoji,.cpx-fl .femoji{font-size:17px}
.bk-wire-fl .femoji{font-size:19px}.me-team .femoji{font-size:15px}.bk-sel-fl .femoji{font-size:13px}
.lg-flag .femoji,.champ-flag .femoji,.bk-pf .femoji{font-size:1.05em}
.champ-flag .fimg{height:1em;border-radius:4px}
.lg-flag .fimg{height:1.05em}

/* ===== league / standings ===== */
.lg{max-width:1080px;margin:0 auto;padding:20px 20px 10px}
.lg-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.lg-h{font-family:'Space Mono',monospace;font-weight:700;letter-spacing:.2em;font-size:15px}
.lg-meta{display:block;font-size:11.5px;color:var(--muted);margin-top:4px}
.lg-manage{display:flex;align-items:center;gap:8px;font-family:'Archivo';font-weight:700;font-size:13px;color:var(--fg);background:linear-gradient(180deg,#16294a,#0f1d39);border:1px solid var(--line);border-radius:11px;padding:10px 16px;cursor:pointer;transition:.15s}
.lg-manage:hover{border-color:var(--ice)}.lg-manage.on{border-color:var(--rose)}
.lg-empty{font-size:12.5px;color:var(--muted);line-height:1.55;padding:13px 15px;border:1px dashed var(--line);border-radius:12px;background:rgba(255,255,255,.02);margin-bottom:14px}
/* standings sub-tabs + panes */
.lg-sub{display:flex;gap:6px;margin-bottom:16px;background:var(--ink2);border:1px solid var(--line);border-radius:12px;padding:5px}
.lg-sub button{flex:1;padding:9px 6px;border:none;border-radius:8px;cursor:pointer;background:transparent;color:var(--muted);font-family:'Archivo';font-weight:700;font-size:12.5px;transition:.15s}
.lg-sub button.on{background:linear-gradient(135deg,#7BD8F5,#3E9FD0);color:#0a1326}
.lg-pane{animation:fadeUp .35s ease both}
/* fixtures view */
.fxv-block{margin-bottom:16px}
.fxv-h{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#7BD8F5;margin:0 0 8px;padding-left:2px}
.fxv{display:grid;grid-template-columns:64px 1fr auto 1fr;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,var(--card),var(--ink));margin-bottom:6px}
.fxv-day{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--faint);line-height:1.25}
.fxv-t{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--text)}
.fxv-t svg,.fxv-t img{width:18px;height:13px;border-radius:2px}
.fxv-a{justify-content:flex-end;text-align:right}.fxv-b{justify-content:flex-start}
.fxv-mid{display:flex;flex-direction:column;align-items:center;min-width:42px}
.fxv-mid b{font-family:'Archivo';font-weight:800;font-size:14px;color:#fff}
.fxv-ko{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
.fxv-mid i{font-style:normal;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.05em;color:var(--faint)}
.fxv-mid i.liveon{color:#34d399}
/* group tables view */
.grpv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px}
.grpv{border:1px solid var(--line);border-radius:13px;padding:12px 13px;background:linear-gradient(180deg,var(--card),var(--ink))}
.grpv-h{font-family:'Archivo';font-weight:800;font-size:13px;color:#fff;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.grpv-done{font-style:normal;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;background:#34d399;color:#06281c;padding:1px 6px;border-radius:5px}
.grpv-row{display:grid;grid-template-columns:18px 1fr 22px 30px 28px;align-items:center;gap:6px;padding:5px 4px;font-size:12px;color:var(--text);border-radius:6px}
.grpv-row>span:nth-child(n+3){text-align:center;font-variant-numeric:tabular-nums;color:var(--muted)}
.grpv-head{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--line);border-radius:0;padding-bottom:6px;margin-bottom:3px}
.grpv-head>span{color:var(--faint)!important}
.grpv-pos{color:var(--faint);font-family:'Space Mono',monospace;font-size:11px;text-align:center}
.grpv-team{display:flex;align-items:center;gap:7px;font-weight:600;text-align:left!important}
.grpv-team svg,.grpv-team img{width:18px;height:13px;border-radius:2px;flex:none}
.grpv-pts{color:#fff!important;font-weight:800}
.grpv-row.q{background:rgba(123,216,245,.08)}
.grpv-row.q .grpv-pos{color:#7BD8F5}
.grpv-note{font-size:11px;color:var(--muted);line-height:1.5;margin:13px 0 0}
/* knockout bracket view */
.kov{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.kov-round{flex:none;min-width:184px;display:flex;flex-direction:column}
.kov-rh{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#7BD8F5;margin-bottom:9px}
.kov-matches{display:flex;flex-direction:column;gap:8px;justify-content:space-around;flex:1}
.kov-m{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--card)}
.kov-side{display:flex;align-items:center;gap:7px;padding:7px 9px;font-size:12px;color:var(--text)}
.kov-side+.kov-side{border-top:1px solid var(--line)}
.kov-fl{width:18px;height:13px;flex:none;display:flex}
.kov-fl svg,.kov-fl img{width:18px;height:13px;border-radius:2px}
.kov-tbd-fl{width:18px;height:13px;border-radius:2px;background:rgba(255,255,255,.06)}
.kov-nm{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kov-sc{font-family:'Archivo';font-weight:800;font-size:13px;color:var(--muted);min-width:14px;text-align:right}
.kov-side.win{background:rgba(52,211,153,.1)}.kov-side.win .kov-nm{color:#fff}.kov-side.win .kov-sc{color:#34d399}
.kov-side.lose{opacity:.55}
/* dossier live news */
.dos-news{display:flex;flex-wrap:wrap;align-items:center;gap:6px;text-decoration:none;padding:8px 10px;margin-top:1px;border:1px solid var(--line);border-radius:9px;background:rgba(123,216,245,.05)}
.dos-news-k{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.04em;text-transform:uppercase;color:#7BD8F5;flex:none}
.dos-news-t{font-size:11.5px;color:var(--text);line-height:1.35;flex:1;min-width:60%}
.dos-news-s{font-family:'Space Mono',monospace;font-size:9px;color:var(--faint)}
.lg-empty b{color:var(--fg)}

.lg-table{display:flex;flex-direction:column;gap:7px}
.lg-row{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:linear-gradient(180deg,var(--card),var(--ink));transition:border-color .15s}
.lg-row.lead{border-color:rgba(233,178,60,.45);background:linear-gradient(180deg,rgba(233,178,60,.07),var(--ink))}
.lg-row.open{border-color:rgba(140,170,220,.3)}
.lg-row-main{width:100%;display:grid;grid-template-columns:38px 1fr auto auto auto 18px;gap:13px;align-items:center;padding:13px 15px;background:transparent;border:none;cursor:pointer;color:var(--fg)}
.lg-rank{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;color:var(--faint);width:30px;height:30px;border:1px solid var(--line);border-radius:9px;display:grid;place-items:center}
.lg-name{font-size:16px;font-weight:700;text-align:left;display:flex;align-items:center;gap:8px;white-space:nowrap}
.lg-you{font-style:normal;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;color:#0a1326;background:var(--ice);padding:2px 6px;border-radius:5px}
.lg-flags{display:flex;gap:3px}
.lg-flag{font-size:18px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.lg-pts{font-family:'Space Mono',monospace;font-weight:700;font-size:24px;color:var(--gold);letter-spacing:-.02em;display:flex;align-items:baseline;gap:4px}
.lg-pts i{font-size:10px;color:var(--muted);font-style:normal}
.lg-goal{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;padding-right:4px;border-right:1px solid var(--line);margin-right:-4px}
.lg-goal em{font-family:'Space Mono',monospace;font-style:normal;font-weight:700;font-size:15px;color:var(--ice)}
.lg-goal i{font-style:normal;font-size:8.5px;letter-spacing:.05em;color:var(--faint);text-transform:uppercase}
.lg-goal.hit em{color:var(--gold)}
.lg-tb{display:block;grid-column:1/-1;margin-top:7px;font-size:10.5px;color:var(--faint);font-style:italic}
.lg-chev{color:var(--muted);transition:transform .2s}.lg-row.open .lg-chev{transform:rotate(180deg)}
.lg-detail{padding:4px 15px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px;animation:fadeUp .25s ease both}
.lg-pick{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line2);border-radius:9px;background:rgba(255,255,255,.02)}
.lg-pick-pot{font-family:'Space Mono',monospace;font-size:10px;color:var(--faint)}
.lg-pick-flag{font-size:17px}
.lg-pick-name{flex:1;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lg-pick-pts{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--gold)}
.lg-guess{grid-column:1/-1;font-size:11.5px;color:var(--muted);margin-top:2px}
.lg-guess b{color:var(--fg);font-family:'Space Mono',monospace}
.lg-closest{font-style:normal;margin-left:8px;font-size:9.5px;font-family:'Space Mono',monospace;color:#0a1326;background:var(--gold);padding:2px 6px;border-radius:5px}

/* manage panel */
.mng{margin-top:16px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(180deg,var(--ink2),var(--ink))}
.mng-tabs{display:flex;gap:4px;padding:10px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
.mng-tabs button{flex:1;font-family:'Archivo';font-weight:700;font-size:13px;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:9px;padding:10px;cursor:pointer;transition:.15s}
.mng-tabs button.on{color:var(--fg);background:linear-gradient(180deg,#16294a,#0f1d39);border-color:var(--line)}
.mng-body{padding:16px}
.mng-sub{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;color:var(--fg);margin:2px 0 12px;display:flex;align-items:center;gap:10px}
.mng-sub2{margin-top:22px;justify-content:space-between}
.mng-prog{font-size:10px;letter-spacing:.04em;color:var(--faint)}
.mng-note{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.mng-note b{color:var(--ice)}
.pe-glab{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase;align-self:center;margin-left:4px}
.fx-groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:11px}
.fx-group{border:1px solid var(--line);border-radius:12px;padding:11px;background:rgba(255,255,255,.015)}
.fx-gh{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.fx{display:grid;grid-template-columns:1fr 36px 12px 36px 1fr;gap:6px;align-items:center;padding:3px 0}
.fx-t{font-family:'Space Mono',monospace;font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden}
.fx-a{text-align:right}.fx-b{text-align:left}
.fx-v{text-align:center;font-size:10px;color:var(--faint)}
.fx-sc{width:100%;text-align:center;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--fg);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:7px;padding:6px 0;outline:none;-moz-appearance:textfield}
.fx-sc:focus{border-color:var(--ice)}
.fx-sc::-webkit-outer-spin-button,.fx-sc::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.autofill{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);background:rgba(233,178,60,.08);border:1px solid rgba(233,178,60,.3);border-radius:8px;padding:7px 11px;cursor:pointer;transition:.15s}
.autofill:hover{background:rgba(233,178,60,.16)}
.ko-rounds{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.ko-rounds button{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:8px;padding:7px 11px;cursor:pointer;transition:.15s}
.ko-rounds button.on{color:#fff;background:linear-gradient(180deg,#16294a,#0f1d39)}
.fx-ko{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:9px}
.kfx{border:1px solid var(--line);border-radius:11px;padding:10px;background:rgba(255,255,255,.015)}
.kfx-line{display:grid;grid-template-columns:1fr 36px 12px 36px 1fr;gap:6px;align-items:center}
.kfx-team{font-family:'Archivo';font-size:12px;font-weight:600;color:var(--fg);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:7px;padding:7px 6px;outline:none;cursor:pointer;min-width:0}
.kfx-team:focus{border-color:var(--ice)}
.kfx-pens{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:11px;color:var(--muted)}
.kfx-pens button{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:7px;padding:5px 10px;cursor:pointer;transition:.15s}
.kfx-pens button.on{color:#0a1326;background:var(--gold);border-color:var(--gold);font-weight:700}
.pk-edit{display:flex;flex-direction:column;gap:9px}
.pe-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.015)}
.pe-name{font-size:14px;font-weight:700;min-width:88px;display:flex;align-items:center;gap:8px}
.pe-picks{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.pe-sel{font-family:'Archivo';font-size:11.5px;font-weight:600;color:var(--fg);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:7px;padding:7px 6px;outline:none;cursor:pointer;flex:1;min-width:96px}
.pe-sel:focus{border-color:var(--ice)}
.pe-goals{width:64px;text-align:center;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--fg);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:7px;padding:7px 0;outline:none;-moz-appearance:textfield}
.pe-lk{display:inline-flex;align-items:center;gap:5px;font-family:'Archivo';font-size:11.5px;font-weight:700;color:var(--fg);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:7px;padding:5px 8px}
.pe-lk i{font-style:normal;letter-spacing:.02em}
.pe-lkg{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#f3c34b;min-width:42px;text-align:center}
.pe-locked .pe-name{opacity:.92}
.cpx-locked{flex:1;display:flex;align-items:center;gap:7px;font-family:'Archivo';font-weight:700;font-size:12.5px;color:var(--muted);background:rgba(255,255,255,.04);border:1px dashed var(--line);border-radius:11px;padding:11px 13px}
.pe-goals::-webkit-outer-spin-button,.pe-goals::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.share-card{border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:12px;background:rgba(255,255,255,.02)}
.share-h{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;margin-bottom:8px}
.share-h svg{color:var(--ice)}
.share-tx{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:13px}
.share-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;border-radius:11px;cursor:pointer;font-family:'Archivo';font-weight:700;font-size:14px;color:#0a1326;background:linear-gradient(135deg,#7BD8F5,#3E9FD0);box-shadow:0 10px 24px -12px rgba(94,200,240,.7);transition:.15s}
.share-btn:hover{filter:brightness(1.07)}
.share-btn2{width:100%;margin-top:9px;padding:10px;border:1px solid var(--line);border-radius:10px;cursor:pointer;font-family:'Archivo';font-weight:600;font-size:12.5px;color:var(--muted);background:transparent;transition:.15s}
.share-btn:disabled,.share-btn.busy{opacity:.65;cursor:default}
.share-btn2:hover{color:var(--fg);border-color:var(--ice)}
.share-in{width:100%;min-height:64px;resize:vertical;font-family:'Space Mono',monospace;font-size:11px;color:var(--fg);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;padding:10px;outline:none;margin-bottom:11px;word-break:break-all}
.share-in:focus{border-color:var(--ice)}
.share-reset{display:flex;align-items:center;gap:6px;margin:4px auto 0;font-family:'Space Mono',monospace;font-size:11px;color:var(--rose);background:transparent;border:1px solid rgba(251,113,133,.3);border-radius:8px;padding:8px 13px;cursor:pointer;transition:.15s}
.share-reset:hover{background:rgba(251,113,133,.1)}

/* ===================== REDESIGN ===================== */
/* brand mark */
.mark{background:radial-gradient(120% 120% at 50% 10%,#1a2747,#0b1730);border:1px solid rgba(233,178,60,.45);box-shadow:0 6px 18px -6px rgba(233,178,60,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.mark-tro{width:23px;height:28px;display:block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.brand-t{letter-spacing:.13em}

/* standings \u2014 leader hero */
.lg-hero{position:relative;overflow:hidden;display:flex;align-items:center;gap:16px;padding:18px 20px;margin-bottom:16px;border-radius:18px;border:1px solid rgba(233,178,60,.42);background:linear-gradient(120deg,#1a2440,#0e1830 62%);box-shadow:0 22px 60px -36px rgba(233,178,60,.55)}
.lg-hero.pre{border-color:rgba(140,170,220,.2);box-shadow:none}
.lg-hero-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(440px 150px at 12% -10%,rgba(233,178,60,.24),transparent 70%)}
.lg-hero.pre .lg-hero-glow{opacity:.22}
.lg-hero-tro{position:relative;flex:none;width:46px;height:56px}
.lg-hero-tro svg{width:46px;height:56px;filter:drop-shadow(0 6px 16px rgba(233,178,60,.5))}
.lg-hero-tx{position:relative;flex:1;min-width:0}
.lg-hero-lab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--gold)}
.lg-hero.pre .lg-hero-lab{color:var(--faint)}
.lg-hero-name{font-size:26px;font-weight:900;letter-spacing:-.01em;margin-top:3px;display:flex;align-items:center;gap:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lg-hero-flags{display:flex;gap:5px;margin-top:9px}
.lg-hero-flags .fimg{height:18px}
.lg-hero-pts{position:relative;flex:none;text-align:right;font-family:'Space Mono',monospace;font-weight:700;font-size:38px;color:var(--gold);line-height:.86;letter-spacing:-.02em}
.lg-hero-pts i{display:block;font-size:11px;color:var(--muted);font-style:normal;letter-spacing:.04em;margin-top:4px}
.lg-row.lead .lg-rank{box-shadow:0 0 0 1px rgba(233,178,60,.5),0 0 14px -2px rgba(233,178,60,.5)}
.lg-h{font-size:16px}

/* scout tab */
.scout{max-width:1180px;margin:0 auto;padding:20px 20px 10px}
.scout-hd{margin-bottom:16px}
.scout-eye{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.2em;color:var(--gold)}
.scout-h{font-size:24px;font-weight:900;letter-spacing:-.01em;margin:6px 0 7px}
.scout-sub{font-size:13px;color:var(--muted);line-height:1.55;max-width:66ch}
.scout-sub b{color:var(--fg)}
/* coupon strip */
.cpx{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,var(--ink2),var(--ink));padding:14px 16px;margin-bottom:18px;box-shadow:0 18px 50px -34px rgba(0,0,0,.9)}
.cpx-h{display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.13em;color:var(--fg);margin-bottom:12px}
.cpx-oracle{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10.5px;color:var(--gold);background:rgba(233,178,60,.08);border:1px solid rgba(233,178,60,.3);border-radius:8px;padding:6px 10px;cursor:pointer;transition:.15s}
.cpx-oracle:hover{background:rgba(233,178,60,.16)}
.cpx-slots{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:13px}
.cpx-slot{display:flex;flex-direction:column;align-items:flex-start;gap:4px;text-align:left;padding:9px 10px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.02);cursor:pointer;color:var(--fg);transition:.14s;min-width:0}
.cpx-slot:hover{border-color:rgba(140,170,220,.35)}
.cpx-slot.here{background:rgba(255,255,255,.045)}
.cpx-dot{width:7px;height:7px;border-radius:50%}
.cpx-p{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--faint);letter-spacing:.08em}
.cpx-fl .fimg{height:18px}
.cpx-nm{font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:flex;align-items:center;gap:5px}
.cpx-foot{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding-top:13px;border-top:1px dashed var(--line)}
.cpx-goals{display:flex;align-items:center;gap:9px}
.cpx-glab{font-size:11px;color:var(--muted)}
.cpx-gstep{display:flex;align-items:center;gap:4px}
.cpx-gstep button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--fg);cursor:pointer;display:grid;place-items:center;transition:.14s}
.cpx-gstep button:hover{border-color:var(--ice);color:var(--ice)}
.cpx-gstep input{width:54px;text-align:center;font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--fg);background:transparent;border:none;outline:none;-moz-appearance:textfield}
.cpx-gstep input::-webkit-outer-spin-button,.cpx-gstep input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cpx-model{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--gold)}
.cpx-proj{margin-left:auto;display:flex;align-items:baseline;gap:6px}
.cpx-plab{font-size:10px;letter-spacing:.1em;color:var(--faint);font-family:'Space Mono',monospace;text-transform:uppercase}
.cpx-proj b{font-family:'Space Mono',monospace;font-size:24px;color:var(--gold);letter-spacing:-.02em}
.cpx-punit{font-size:10px;color:var(--muted)}
.cpx-copy{display:flex;align-items:center;gap:6px;font-family:'Archivo';font-weight:700;font-size:12.5px;color:#0a1326;background:linear-gradient(135deg,#7BD8F5,#3E9FD0);border:none;border-radius:10px;padding:9px 14px;cursor:pointer;transition:.15s}
.cpx-copy:hover{filter:brightness(1.07)}
.cpx-warn{display:flex;gap:8px;align-items:flex-start;margin-top:12px;font-size:11px;color:#ffd9df;line-height:1.45}
.cpx-warn svg{color:var(--rose);flex:none;margin-top:1px}
.cpx-save{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.cpx-savebtn{flex:1;min-width:170px;padding:12px 14px;border:none;border-radius:11px;cursor:pointer;font-family:'Archivo';font-weight:800;font-size:13.5px;color:#0a1326;background:linear-gradient(135deg,#f3c34b,#d99a2b);box-shadow:0 10px 22px -12px rgba(233,178,60,.8);transition:.15s}
.cpx-savebtn:hover{filter:brightness(1.05)}
.cpx-savebtn:active{transform:translateY(1px)}
.cpx-savebtn:disabled{opacity:.6;cursor:default}
.cpx-savebtn.busy{opacity:.75;cursor:default}
.cpx-sync{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.03em;color:var(--muted)}
.cpx-sync.on{color:#34d399}.cpx-sync.off{color:#9fb0c8}
.cpx-savehint{font-size:11px;color:var(--muted);line-height:1.45;margin:9px 0 0}
.cloud-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:6px;vertical-align:middle;margin-left:8px;background:rgba(159,176,200,.16);color:#9fb0c8}
.cloud-badge.on{background:#34d399;color:#06281c}.cloud-badge.off{background:rgba(159,176,200,.16);color:#9fb0c8}
/* dossier \u2014 scout report card */
.dos{position:relative}
.dos.drafted{border-color:rgba(94,200,240,.55);background:linear-gradient(180deg,rgba(94,200,240,.07),var(--ink))}
.dos-grade{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;letter-spacing:-.02em;border:1px solid currentColor;background:rgba(255,255,255,.05)}
.dos-grade.gAp,.dos-grade.gA{color:#34d399}
.dos-grade.gBp,.dos-grade.gB{color:#5EC8F0}
.dos-grade.gCp,.dos-grade.gC{color:#E9B23C}
.dos-grade.gD{color:#8ba0c4}
.dos-top{padding-right:38px}
.dos-bars{display:flex;flex-direction:column;gap:5px;margin:1px 0 2px}
.dos-bar{display:flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-size:9.5px;color:var(--faint)}
.dos-bar>span{width:26px;letter-spacing:.06em}
.dos-bar i{flex:1;height:6px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;display:block}
.dos-bar b{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,#3E9FD0,#7BD8F5)}
.dos-bar em{width:22px;text-align:right;font-style:normal;color:var(--muted)}
.dos-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:3px;padding-top:11px;border-top:1px solid var(--line2)}
.dos-ep{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--faint)}.dos-ep b{color:var(--gold);font-size:14px;margin-right:2px}
.dos-draft{display:flex;align-items:center;gap:6px;font-family:'Archivo';font-weight:700;font-size:12px;color:#0a1326;background:linear-gradient(135deg,#7BD8F5,#3E9FD0);border:none;border-radius:9px;padding:8px 13px;cursor:pointer;transition:.15s;white-space:nowrap}
.dos-draft:hover{filter:brightness(1.07)}
.dos-draft.on{background:rgba(94,200,240,.14);color:var(--ice);border:1px solid rgba(94,200,240,.5)}

/* simulate \u2014 pitch accents */
.sm-mode button.on{border-color:#34d399}
.sc-cv{background:#147230}
.sc-pitch{box-shadow:inset 0 0 44px rgba(0,0,0,.32)}

/* bookie \u2014 bookmaker shop */
.bk-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:16px 18px;margin-bottom:18px;border-radius:16px;border:1px solid rgba(233,178,60,.3);background:linear-gradient(180deg,#0f2a1c,#0b1f15);box-shadow:inset 0 0 60px rgba(0,0,0,.35),0 18px 50px -36px rgba(0,0,0,.9)}
.bk-head-l{display:flex;align-items:center;gap:13px}
.bk-rose{width:38px;height:46px;flex:none;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5))}
.bk-head-t{font-family:'Archivo';font-weight:900;font-size:19px;letter-spacing:.04em;color:#FCE49A}
.bk-head-s{font-size:10.5px;color:#9fc4ad;margin-top:2px}
.bk-bal{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.bk-bal-l{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:#9fc4ad}
.bk-bal-v{font-family:'Space Mono',monospace;font-weight:700;font-size:26px;color:#FCE49A}
.bk-sec{padding-left:13px;border-left:3px solid var(--gold);text-transform:uppercase}
.bk-out,.bk-fix{padding:12px;border-radius:14px;background:linear-gradient(180deg,#10301f,#0c2417);border:1px solid rgba(255,255,255,.05);box-shadow:inset 0 0 50px rgba(0,0,0,.3)}
.bk-orow{background:linear-gradient(180deg,#103021,#0c2418);border-color:rgba(255,255,255,.06)}
.bk-orow:hover{border-color:rgba(233,178,60,.35)}
.bk-orow.sel{border-color:var(--gold);background:linear-gradient(180deg,rgba(233,178,60,.16),#0c2418)}
.bk-more{background:transparent;border-color:rgba(255,255,255,.1);color:#9fc4ad}
.bk-game{background:linear-gradient(180deg,#0f2c1d,#0b2216);border-color:rgba(255,255,255,.06)}
.bk-pick{background:linear-gradient(180deg,#103021,#0c2418);border-color:rgba(255,255,255,.07)}
.bk-pick.sel{background:linear-gradient(180deg,rgba(233,178,60,.16),#0c2418)}
.bk-md button.on{background:#10301f;border-color:#34d399;color:#fff}
.bk-news{color:#cfe3d6;border-top-color:rgba(255,255,255,.08)}
.bk-wire{display:flex;flex-direction:column;gap:7px}
.bk-wire-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;border:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg,#0f2c1d,#0b2216);color:var(--fg);text-decoration:none;transition:.13s}
.bk-wire-item:hover{border-color:rgba(233,178,60,.35)}
.bk-wire-fl{flex:none}.bk-wire-fl .fimg{height:20px}
.bk-wire-tx{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.bk-wire-team{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:#9fc4ad}
.bk-wire-title{font-size:12.5px;line-height:1.35;color:#eaf1fb;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bk-wire-src{flex:none;font-size:9.5px;color:var(--faint);font-family:'Space Mono',monospace;align-self:flex-start;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-wire-empty{padding:16px;border-radius:12px;border:1px dashed rgba(255,255,255,.12);background:rgba(255,255,255,.02);font-size:12px;color:#9fc4ad;line-height:1.5}
.bk{max-width:1040px}
.bk-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:18px;align-items:start}
.bk-main{min-width:0}
.bk-rail{position:sticky;top:84px;max-height:calc(100vh - 100px);overflow-y:auto;border:1px solid rgba(255,255,255,.07);border-radius:16px;background:linear-gradient(180deg,#0f2a1c,#0b1f15);box-shadow:inset 0 0 50px rgba(0,0,0,.3);padding:14px}
.bk-rail-h{font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#dfe7f3;margin:0 0 12px;padding-left:11px;border-left:3px solid var(--gold)}
.bk-rail .bk-wire-item{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.07)}

/* profile picker + today + how-it-works */
.me-pick{border:1px solid rgba(94,200,240,.35);border-radius:16px;background:linear-gradient(180deg,rgba(94,200,240,.08),var(--ink));padding:18px;margin-bottom:16px}
.me-pick-h{font-size:18px;font-weight:900;letter-spacing:-.01em}
.me-pick-sub{font-size:12.5px;color:var(--muted);line-height:1.5;margin:6px 0 13px;max-width:54ch}
.me-pick-grid{display:flex;flex-wrap:wrap;gap:8px}
.me-pick-grid button{font-family:'Archivo';font-weight:700;font-size:13px;color:var(--fg);background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;padding:10px 15px;cursor:pointer;transition:.14s}
.me-pick-grid button:hover{border-color:var(--ice);color:#fff;background:rgba(94,200,240,.1)}
.me-today{border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,var(--ink2),var(--ink));padding:14px 16px;margin-bottom:16px}
.me-today-top{display:flex;justify-content:space-between;align-items:center}
.me-today-who{font-size:12.5px;color:var(--muted)}.me-today-who b{color:var(--fg)}
.me-switch{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--faint);background:transparent;border:1px solid var(--line);border-radius:7px;padding:5px 10px;cursor:pointer;transition:.14s}
.me-switch:hover{color:var(--ice);border-color:var(--ice)}
.me-today-none{font-size:12px;color:var(--faint);margin-top:8px}
.me-today-h{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:11px 0 9px}
.me-today-list{display:flex;flex-direction:column;gap:7px}
.me-game{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.02)}
.me-team{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;min-width:0;color:var(--muted)}
.me-team.mine{color:var(--fg)}
.me-team .fimg{height:16px;flex:none}
.me-r{justify-content:flex-end;text-align:right}
.me-mid{display:flex;flex-direction:column;align-items:center;line-height:1.1;min-width:54px}
.me-mid b{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;color:var(--fg)}
.me-mid b.me-v{color:var(--faint);font-size:13px}
.me-mid i{font-style:normal;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.04em;color:var(--faint);text-transform:uppercase;margin-top:2px}
.me-mid i.liveon{color:#34d399}
.how{position:relative;border:1px dashed var(--line);border-radius:14px;background:rgba(255,255,255,.02);padding:14px 38px 14px 16px;margin-bottom:16px}
.how-x{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--faint);cursor:pointer;display:flex;padding:4px}
.how-x:hover{color:var(--fg)}
.how-h{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.how-p{font-size:12.5px;line-height:1.6;color:#cdd9ee}.how-p b{color:#fff}
.lg-mv{font-style:normal;font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.02em;padding:1px 5px;border-radius:6px;flex:none}
.lg-mv.up{color:#34d399;background:rgba(52,211,153,.13)}
.lg-mv.down{color:#fb7185;background:rgba(251,113,133,.13)}
.refresh-hint{width:100%;display:flex;align-items:center;gap:10px;text-align:left;margin-bottom:16px;padding:11px 14px;border-radius:12px;cursor:pointer;
  color:#0a1326;background:linear-gradient(180deg,#f3c34b,#e9b23c);border:1px solid #caa033;box-shadow:0 2px 0 #b98f24;transition:.12s}
.refresh-hint:hover{filter:brightness(1.04)}
.refresh-hint:active{transform:translateY(1px);box-shadow:0 1px 0 #b98f24}
.refresh-hint svg{flex:none}
.refresh-hint span{font-size:13px;font-weight:600;line-height:1.35}.refresh-hint span b{font-weight:800}
.refresh-hint-go{margin-left:auto;flex:none;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;background:#0a1326;color:#f3c34b;padding:4px 9px;border-radius:999px}
.refresh-hint.busy svg{animation:rfspin .8s linear infinite}
.bk-oddsnote{font-size:11.5px;color:var(--muted);margin:-4px 0 10px}
.bk-orow.out{cursor:default;opacity:.5;filter:grayscale(.6)}
.bk-orow.out:hover{border-color:var(--line)}
.bk-oout{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;color:#fb7185;border:1px solid rgba(251,113,133,.4);border-radius:7px;padding:3px 9px}
@media (max-width:900px){
  .bk-grid{grid-template-columns:1fr}
  .bk-rail{position:static;order:-1;max-height:40vh;overflow-y:auto}
}
/* betting slip \u2014 cream paper */
.bk-slip{background:linear-gradient(180deg,#f6efdd,#ece2c9);border:none;border-radius:3px;color:#231d12;box-shadow:0 18px 46px -20px rgba(0,0,0,.75);padding:15px 16px 15px;position:relative}
.bk-slip{position:sticky;top:72px;z-index:20}
.bk-slip-h{cursor:default}
.bk-slip::before{content:"";position:absolute;top:-5px;left:0;right:0;height:10px;background:radial-gradient(circle at 6px 5px,#0a1326 0 4px,transparent 4.6px);background-size:12px 10px}
.bk-slip-h{color:#7a1f12;border-bottom:1px dashed #cdbf9c;padding-bottom:9px;letter-spacing:.16em}
.bk-slip-h button{color:#9a8a63}
.bk-sel{border-bottom:1px dashed #d8cba8;color:#231d12}
.bk-sel-o{color:#7a1f12}
.bk-sel-x{color:#b0a079}
.bk-stk{color:#5c513a}
.bk-stk span{color:#5c513a}
.bk-stk input{background:#fffaf0;border:1px solid #cdbf9c;color:#231d12}
.bk-ret{color:#5c513a}.bk-ret b{color:#231d12}
.bk-place{background:linear-gradient(135deg,#1f9d57,#147a3f);color:#fff}
.bk-warn{color:#a3261a}
.bk-sel-fl{display:inline-flex;flex:none}
.bk-sel-fl .fimg{height:14px}
.bk-bet-name{display:flex;align-items:center;gap:7px;min-width:0}
.bk-bet-name .fimg{height:15px;flex:none}

@media (max-width:760px){
  .scout{padding:16px 14px}
  .cpx-slots{grid-template-columns:repeat(3,1fr)}
  .cpx-proj{margin-left:0}
  .bk-slip{top:108px}
  .lg-hero{padding:15px 16px;gap:12px}
  .lg-hero-name{font-size:21px}
  .lg-hero-pts{font-size:30px}
  .lg-hero-tro,.lg-hero-tro svg{width:38px;height:46px}
}
@media (max-width:430px){
  .lg-hero-flags .fimg{height:15px}
  .bk-head-t{font-size:17px}
}
/* ===================== /REDESIGN ===================== */

@media (max-width:760px){
  .lg{padding:16px 14px}
  .lg-row-main{grid-template-columns:30px 1fr auto auto 16px;gap:9px;padding:12px}
  .lg-flags{display:none}
  .lg-name{font-size:15px}
  .fx-ko{grid-template-columns:1fr}
  .pe-name{min-width:100%}
  .pe-sel{min-width:calc(33% - 6px)}
}

@media (max-width:1080px){
  .pk-main{grid-template-columns:1fr}
  .coupon{position:static}
}
@media (max-width:760px){
  .top{flex-wrap:wrap;gap:10px;padding:12px 14px}
  .brand{flex:1 1 auto}
  .top-total{order:2;flex:0 0 auto}
  .tabs{order:3;flex:1 1 100%;justify-content:space-between}
  .tabs button{flex:1;justify-content:center;padding:10px 8px}
  .pk,.sc,.sm{padding:16px 14px}
  .row{grid-template-columns:24px 1fr auto auto;gap:11px;padding:12px}
  .prof-cell,.adv{display:none}
  .radio{position:static;transform:none;justify-self:end}
  .drawer{grid-template-columns:1fr}
  .champ-team{font-size:30px}.champ-flag{font-size:32px}
  .ko-grid{grid-template-columns:1fr}
  .sm-title{font-size:24px}
}
@media (prefers-reduced-motion:reduce){.app *{animation:none!important;transition:none!important}}
`;
